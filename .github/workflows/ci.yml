name: CI

on:
  push:
    branches:
      - main
      - rebuild/ai-driven-architecture
  pull_request:

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run quality checks
        run: pnpm lint && pnpm test

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taro
          AUTH_SECRET: ci-secret-value
        run: pnpm build
